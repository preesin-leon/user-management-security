{% extends "base.html" %}
{% block content %}
    <div class="card login-card">
        <h2 class="card-title">用户登录</h2>
        {% if msg %}
            <div class="alert alert-success">{{ msg }}</div>
        {% endif %}
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required maxlength="30" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required minlength="8" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="form-footer">还没有账号？<a href="/register">立即注册</a></p>
    </div>
{% endblock %}
