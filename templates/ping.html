{% extends "base.html" %}
{% block content %}
    <div class="card">
        <h2 class="card-title">Ping 网络诊断</h2>
        <p class="card-text">输入 IP 地址或域名进行 Ping 测试。</p>

        <form method="POST" action="/ping" class="search-form">
            <div class="search-group">
                <input type="text" name="ip" class="search-input" placeholder="输入 IP 或域名，如 8.8.8.8" value="{{ ip or '' }}" required>
                <button type="submit" class="btn btn-primary">Ping</button>
            </div>
        </form>

        {% if result %}
            <div class="ping-result">
                <div class="ping-output">{{ result }}</div>
            </div>
        {% endif %}
    </div>
{% endblock %}
