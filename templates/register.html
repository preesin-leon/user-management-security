{% extends "base.html" %}
{% block content %}
    <div class="card login-card">
        <h2 class="card-title">用户注册</h2>
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/register" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="3-30个字符，字母/数字/中文" required maxlength="30" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="至少8位，需含大小写字母和数字" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱" required maxlength="100">
            </div>
            <div class="form-group">
                <label for="phone">手机号（选填）</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入11位手机号" pattern="1[3-9]\d{9}" maxlength="11">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="form-footer">已有账号？<a href="/login">立即登录</a></p>
    </div>
{% endblock %}
