{% extends "base.html" %}
{% block content %}
    <div class="card page-content-card">
        {% if page_content %}
            <div class="page-content">
                {{ page_content | safe }}
            </div>
            <div class="card-actions">
                <a href="javascript:history.back()" class="btn btn-primary">返回</a>
            </div>
        {% else %}
            <h2 class="card-title">页面不存在</h2>
            <p class="card-text">未找到页面 "{{ page_name }}"，请检查页面名称是否正确。</p>
            <div class="card-actions">
                <a href="/" class="btn btn-primary">返回首页</a>
            </div>
        {% endif %}
    </div>
{% endblock %}
