{% extends "base.html" %}
{% block content %}
    <div class="card">
        <h2 class="card-title">搜索用户</h2>
        <form method="GET" action="/search" class="search-form">
            <div class="search-group">
                <input type="text" name="keyword" class="search-input" placeholder="输入用户名或邮箱搜索..." value="{{ keyword or '' }}">
                <button type="submit" class="btn btn-primary">搜索</button>
            </div>
        </form>
        {% if keyword %}
            <div class="search-results">
                {% if results %}
                    <p class="result-count">共找到 {{ results|length }} 条结果</p>
                    <table class="table">
                        <thead>
                            <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>手机</th></tr>
                        </thead>
                        <tbody>
                            {% for row in results %}
                            <tr>
                                <td>{{ row.id }}</td>
                                <td>{{ row.username }}</td>
                                <td>{{ row.email }}</td>
                                <td>{{ row.phone }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                {% else %}
                    <p class="no-results">无搜索结果</p>
                {% endif %}
            </div>
        {% endif %}
    </div>
{% endblock %}
