{% extends "base.html" %}
{% block content %}
    <div class="card">
        <h2 class="card-title">XML 数据导入</h2>
        <p class="card-text">输入 XML 格式的用户数据进行导入。</p>

        <form method="POST" action="/xml-import" class="xml-form">
            <div class="form-group">
                <label for="xml_data">XML 数据</label>
                <textarea id="xml_data" name="xml_data" class="xml-textarea" rows="12" placeholder="请输入 XML 数据...">{{ request.form.get('xml_data', '') }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">导入</button>
        </form>

        {% if error_msg %}
            <div class="alert alert-error">{{ error_msg }}</div>
        {% endif %}

        {% if result_data %}
            <div class="xml-result">
                <h3 class="card-subtitle">解析结果</h3>
                <div class="xml-output"><pre>{{ result_data }}</pre></div>
            </div>
        {% endif %}
    </div>
{% endblock %}
